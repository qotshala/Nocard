<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Czech Loyalty Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; }
        .store-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .store-card:active { transform: scale(0.95); opacity: 0.9; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 max-w-xl mx-auto flex justify-between items-center">
        <div>
            <h1 id="page-title" class="text-2xl font-800 text-gray-900 tracking-tight text-blue-600">WALLET</h1>
            <p id="page-desc" class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Czech Republic Edition</p>
        </div>
        <div class="h-10 w-10 bg-white shadow-sm border border-gray-100 rounded-xl flex items-center justify-center">
            <span class="text-lg">🇨🇿</span>
        </div>
    </header>

    <div id="search-container" class="px-6 mb-6 max-w-xl mx-auto">
        <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Search store..." 
               class="w-full p-4 bg-white border border-gray-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium">
    </div>

    <main id="home-section" class="max-w-xl mx-auto px-6 grid grid-cols-2 gap-4">
        </main>

    <section id="dashboard-section" class="hidden max-w-xl mx-auto px-6">
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm mb-8">
            <h3 class="font-800 text-lg mb-4">Add New Card</h3>
            <div class="space-y-3">
                <input type="text" id="shop-name" placeholder="Store Name (e.g. Tesco)" class="w-full p-4 bg-gray-50 rounded-xl border-none outline-none">
                <input type="text" id="barcode-url" placeholder="Barcode/QR Image Link" class="w-full p-4 bg-gray-50 rounded-xl border-none outline-none">
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-400 uppercase ml-2">Brand Color</span>
                    <input type="color" id="shop-color" value="#2563eb" class="h-10 w-16 bg-transparent cursor-pointer">
                </div>
                <button onclick="addCard()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-100 mt-2">Add to Wallet</button>
            </div>
        </div>

        <h3 class="font-800 text-gray-400 text-xs uppercase tracking-widest mb-4 ml-2">Active Cards Management</h3>
        <div id="admin-list" class="space-y-2">
            </div>
    </section>

    <div id="scan-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center">
            <h2 id="modal-title" class="text-2xl font-800 mb-8 text-gray-900 uppercase"></h2>
            <div class="w-full p-4 bg-white border-2 border-dashed border-gray-100 rounded-2xl mb-8">
                <img id="modal-img" src="" class="w-full h-auto">
            </div>
            <button onclick="closeModal()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">CLOSE</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-nav rounded-[2.5rem] shadow-xl flex items-center justify-around px-8 z-40 max-w-xl mx-auto border border-white/50">
        <button onclick="showSection('home')" id="nav-home" class="flex flex-col items-center text-blue-600 transition-all">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1">Wallet</span>
        </button>
        <button onclick="showSection('dashboard')" id="nav-dash" class="flex flex-col items-center text-gray-300 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold mt-1">Dashboard</span>
        </button>
    </nav>

    <script>
        // List of shops with their actual branding colors
        const defaultList = [
            { id: 1, name: 'Tesco', color: '#00539f', url: '#' },
            { id: 2, name: 'Lidl', color: '#0050aa', url: '#' },
            { id: 3, name: 'Albert', color: '#7ab800', url: '#' },
            { id: 4, name: 'Billa', color: '#ffec00', url: '#' },
            { id: 5, name: 'Penny', color: '#d71920', url: '#' },
            { id: 6, name: 'Kaufland', color: '#e30613', url: '#' },
            { id: 7, name: 'dm', color: '#005596', url: '#' },
            { id: 8, name: 'Rossmann', color: '#cc0000', url: '#' }
        ];

        let cards = JSON.parse(localStorage.getItem('cz_loyalty_data')) || defaultList;

        function render() {
            const grid = document.getElementById('home-section');
            const adminList = document.getElementById('admin-list');
            grid.innerHTML = '';
            adminList.innerHTML = '';

            cards.forEach(card => {
                // Home Card
                grid.innerHTML += `
                    <div onclick="openModal('${card.name}', '${card.url}')" class="store-card h-36 rounded-[2rem] p-5 flex flex-col justify-between shadow-sm border border-white" style="background-color: ${card.color}">
                        <span class="text-white font-800 text-lg leading-tight uppercase tracking-tighter">${card.name}</span>
                        <div class="bg-white/20 self-start px-3 py-1 rounded-full">
                            <span class="text-white text-[9px] font-bold uppercase tracking-widest">Tap to Scan</span>
                        </div>
                    </div>
                `;

                // Dashboard Item
                adminList.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full" style="background:${card.color}"></div>
                            <span class="font-bold text-gray-700">${card.name}</span>
                        </div>
                        <button onclick="deleteCard(${card.id})" class="text-red-500 font-bold text-[10px] uppercase tracking-widest bg-red-50 px-3 py-1 rounded-lg">Remove</button>
                    </div>
                `;
            });
            localStorage.setItem('cz_loyalty_data', JSON.stringify(cards));
        }

        function showSection(section) {
            const isHome = section === 'home';
            document.getElementById('home-section').classList.toggle('hidden', !isHome);
            document.getElementById('search-container').classList.toggle('hidden', !isHome);
            document.getElementById('dashboard-section').classList.toggle('hidden', isHome);
            
            // UI Updates
            document.getElementById('page-title').innerText = isHome ? "WALLET" : "DASHBOARD";
            document.getElementById('page-desc').innerText = isHome ? "Czech Republic Edition" : "Manage Your Cards";
            document.getElementById('nav-home').className = isHome ? 'flex flex-col items-center text-blue-600' : 'flex flex-col items-center text-gray-300';
            document.getElementById('nav-dash').className = !isHome ? 'flex flex-col items-center text-blue-600' : 'flex flex-col items-center text-gray-300';
            
            if(isHome) render();
        }

        function filterCards() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.getElementsByClassName('store-card');
            for (let i = 0; i < items.length; i++) {
                let name = items[i].innerText.toLowerCase();
                items[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }

        function addCard() {
            const name = document.getElementById('shop-name').value;
            const url = document.getElementById('barcode-url').value;
            const color = document.getElementById('shop-color').value;
            if (name && url) {
                cards.unshift({ id: Date.now(), name, url, color });
                render();
                showSection('home');
                document.getElementById('shop-name').value = '';
                document.getElementById('barcode-url').value = '';
            } else {
                alert("Please enter both Name and Barcode Link");
            }
        }

        function deleteCard(id) {
            if(confirm("Are you sure?")) {
                cards = cards.filter(c => c.id !== id);
                render();
            }
        }

        function openModal(name, url) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-img').src = (url === '#' || url === '') ? 'https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg' : url;
            document.getElementById('scan-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('scan-modal').classList.add('hidden');
        }

        render();
    </script>
</body>
</html>
